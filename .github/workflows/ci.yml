name: QA CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *" # nightly regression

jobs:
  smoke-tests:
    name: Smoke Tests (PR Gate)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Smoke Tests
        run: npx playwright test --grep @smoke

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    needs: smoke-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Run API Tests
        run: npx playwright test --grep @api

  regression-tests:
    name: Regression Tests (Full Suite)
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Run Regression Tests
        run: npx playwright test --grep @regression

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report